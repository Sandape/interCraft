name: CI

on:
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  frontend-core:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npm run check:ai-contracts
      - run: npm run typecheck
      - run: npm run build
      - run: mkdir -p test-results
      - name: Run core frontend tests
        run: >
          npx vitest run
          --reporter default
          --reporter junit
          --outputFile test-results/frontend-core-junit.xml
          src/api/__tests__/client.test.ts
          src/api/__tests__/token-storage.test.ts
          src/features/onboarding/__tests__/onboarding-state.test.ts
          src/lib/outbox/__tests__/OutboxRepository.test.ts
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "frontend-core-junit-${{ github.run_id }}-${{ github.run_attempt }}"
          path: test-results/frontend-core-junit.xml
          if-no-files-found: error
          retention-days: 14

  backend-core:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Sync deps
        working-directory: backend
        run: uv sync --locked --extra dev
      - name: Create test-results
        working-directory: backend
        run: mkdir -p test-results
      - name: Run core backend tests
        working-directory: backend
        env:
          APP_ENV: test
          JWT_SECRET: "ci-only-dummy-secret-that-is-more-than-32-bytes-long!!"
        run: |
          MASTER_KEY="$(python -c 'import base64, os; print(base64.b64encode(os.urandom(32)).decode())')"
          export MASTER_KEY
          uv run pytest \
            --junitxml=test-results/backend-core-junit.xml \
            tests/unit/test_ids.py \
            tests/unit/test_security.py \
            tests/unit/test_auth_token_expired.py \
            tests/unit/test_request_id_middleware.py
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "backend-core-junit-${{ github.run_id }}-${{ github.run_attempt }}"
          path: backend/test-results/backend-core-junit.xml
          if-no-files-found: error
          retention-days: 14

  checkpointer-fresh-db:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: checkpointer_fresh
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U ci -d checkpointer_fresh"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Sync locked dependencies
        working-directory: backend
        run: uv sync --locked --extra dev
      - name: Run checkpointer fresh-DB contract
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://ci:ci@127.0.0.1:5432/checkpointer_fresh
          INTERCRAFT_TEST_CHECKPOINTER_FRESH_DB_URL: postgresql+asyncpg://ci:ci@127.0.0.1:5432/checkpointer_fresh
          INTERCRAFT_TEST_CHECKPOINTER_FRESH_DB_OWNED: '1'
          JWT_SECRET: "ci-only-dummy-secret-that-is-more-than-32-bytes-long!!"
        run: |
          set -o pipefail
          mkdir -p test-results
          MASTER_KEY="$(python -c 'import base64, os; print(base64.b64encode(os.urandom(32)).decode())')"
          export MASTER_KEY
          # REQ-081: DATABASE_URL satisfies the repository-wide integration
          # guard while the dedicated URL + ownership marker protect mutation.
          # Any JUnit skip means that this wiring regressed. The command-level
          # timeout preserves evidence and leaves time for artifact upload.
          timeout 5m uv run pytest tests/integration/test_checkpointer_fresh_database.py \
            --junitxml=test-results/checkpointer-fresh-db-junit.xml \
            -v 2>&1 | tee test-results/checkpointer-fresh-db.log
      - name: Assert JUnit has zero skips
        working-directory: backend
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          junit_path = Path("test-results/checkpointer-fresh-db-junit.xml")
          tree = ET.parse(junit_path)
          root = tree.getroot()
          suites = [root] if root.tag == "testsuite" else list(root)
          total = lambda key: sum(int(suite.attrib.get(key, "0") or 0) for suite in suites)
          skipped = total("skipped")
          errors = total("errors")
          failures = total("failures")
          tests = total("tests")
          assert tests == 2, (
              f"JUnit reports {tests} tests (expected 2); "
              "checkpointer-fresh-db job must collect exactly 2 contract tests"
          )
          assert skipped == 0, (
              f"JUnit reports {skipped} skipped tests; the fresh-DB contract "
              "must run with zero skip when INTERCRAFT_TEST_CHECKPOINTER_FRESH_DB_URL is set"
          )
          assert failures == 0 and errors == 0, (
              f"JUnit reports failures={failures} errors={errors}; "
              "check the linked pytest log for details"
          )
          print(f"checkpointer-fresh-db: {tests} tests, 0 skips, 0 failures, 0 errors")
          PY
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "checkpointer-fresh-db-${{ github.run_id }}-${{ github.run_attempt }}"
          path: |
            backend/test-results/checkpointer-fresh-db-junit.xml
            backend/test-results/checkpointer-fresh-db.log
          if-no-files-found: error
          retention-days: 14

  onboarding-root-pg16:
    timeout-minutes: 12
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: intercraft_test
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U ci -d intercraft_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Sync locked dependencies
        working-directory: backend
        run: uv sync --locked --extra dev
      - name: Create test-results dir
        working-directory: backend
        run: mkdir -p test-results
      - name: Create migration database roles
        env:
          PGPASSWORD: ci
        run: >-
          psql --host 127.0.0.1 --username ci --dbname intercraft_test
          --set ON_ERROR_STOP=1
          --command 'CREATE ROLE appuser NOLOGIN; CREATE ROLE postgres SUPERUSER NOLOGIN'
      - name: Run Alembic migrations
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://ci:ci@127.0.0.1:5432/intercraft_test
          JWT_SECRET: "ci-only-dummy-secret-that-is-more-than-32-bytes-long!!"
        run: |
          MASTER_KEY="$(python -c 'import base64, os; print(base64.b64encode(os.urandom(32)).decode())')"
          export MASTER_KEY
          uv run alembic upgrade head 2>&1
      - name: Run Issue #61 onboarding root tests
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://ci:ci@127.0.0.1:5432/intercraft_test
          JWT_SECRET: "ci-only-dummy-secret-that-is-more-than-32-bytes-long!!"
        run: |
          set -o pipefail
          MASTER_KEY="$(python -c 'import base64, os; print(base64.b64encode(os.urandom(32)).decode())')"
          export MASTER_KEY
          timeout 8m uv run pytest \
            tests/integration/resume_derive/test_onboarding_root_persistence.py \
            tests/unit/test_resume_derive_root_logging.py \
            --junitxml=test-results/onboarding-root-junit.xml \
            -v 2>&1 | tee test-results/onboarding-root.log
      - name: Assert JUnit total=14, zero skip/failure/error
        working-directory: backend
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          junit_path = Path("test-results/onboarding-root-junit.xml")
          tree = ET.parse(junit_path)
          root = tree.getroot()
          suites = [root] if root.tag == "testsuite" else list(root)
          def attr(key):
              return sum(int(s.attrib.get(key, "0") or 0) for s in suites)
          total = attr("tests")
          skipped = attr("skipped")
          errors = attr("errors")
          failures = attr("failures")
          print(f"onboarding-root: {total} tests, {skipped} skipped, {failures} failures, {errors} errors")
          assert total == 14, f"expected 14 tests, got {total}"
          assert skipped == 0, f"expected 0 skipped, got {skipped}"
          assert failures == 0, f"expected 0 failures, got {failures}"
          assert errors == 0, f"expected 0 errors, got {errors}"
          PY
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "onboarding-root-junit-${{ github.run_id }}-${{ github.run_attempt }}"
          path: |
            backend/test-results/onboarding-root-junit.xml
            backend/test-results/onboarding-root.log
          if-no-files-found: error
          retention-days: 14

  frontend-onboarding-gate:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: npm ci
      - name: Create test-results
        run: mkdir -p test-results
      - name: Run Issue #61 focused onboarding tests
        run: |
          set -o pipefail
          npx vitest run \
            --reporter default \
            --reporter junit \
            --outputFile test-results/frontend-onboarding-junit.xml \
            src/pages/__tests__/Onboarding.test.tsx \
            src/pages/__tests__/ResumeEditorV2.markdown-cutover.test.tsx \
            2>&1 | tee test-results/frontend-onboarding.log
      - name: Assert frontend JUnit total=13, zero skip/failure/error
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          junit_path = Path("test-results/frontend-onboarding-junit.xml")
          root = ET.parse(junit_path).getroot()
          suites = [root] if root.tag == "testsuite" else list(root)
          def attr(key):
              return sum(int(s.attrib.get(key, "0") or 0) for s in suites)
          total = attr("tests")
          skipped = attr("skipped")
          errors = attr("errors")
          failures = attr("failures")
          print(f"frontend-onboarding: {total} tests, {skipped} skipped, {failures} failures, {errors} errors")
          assert total == 13, f"expected 13 tests, got {total}"
          assert skipped == 0, f"expected 0 skipped, got {skipped}"
          assert failures == 0, f"expected 0 failures, got {failures}"
          assert errors == 0, f"expected 0 errors, got {errors}"
          PY
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "frontend-onboarding-junit-${{ github.run_id }}-${{ github.run_attempt }}"
          path: |
            test-results/frontend-onboarding-junit.xml
            test-results/frontend-onboarding.log
          if-no-files-found: error
          retention-days: 14

  worker-readiness:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Sync locked dependencies
        working-directory: backend
        run: uv sync --locked --extra dev
      - name: Sync frontend dependencies for proxy smoke
        run: npm ci --no-audit --no-fund
      - name: Run worker lifecycle readiness gate
        working-directory: backend
        env:
          APP_ENV: test
          # These lifecycle tests never connect to Postgres. A syntactically
          # real, unreachable URL avoids the repository-wide integration-dir
          # placeholder skip guard without sharing a database.
          DATABASE_URL: postgresql+asyncpg://ci:ci@127.0.0.1:1/worker_readiness
          REDIS_URL: redis://127.0.0.1:6379/15
          INTERCRAFT_TEST_REDIS_URL: redis://127.0.0.1:6379/15
          INTERCRAFT_TEST_REDIS_OWNED: '1'
          INTERCRAFT_PID_EVIDENCE_PATH: test-results/owned-pid-evidence.jsonl
          JWT_SECRET: "ci-only-dummy-secret-that-is-more-than-32-bytes-long!!"
        run: |
          set -o pipefail
          mkdir -p test-results
          MASTER_KEY="$(python -c 'import base64, os; print(base64.b64encode(os.urandom(32)).decode())')"
          export MASTER_KEY
          : > test-results/owned-pid-evidence.jsonl
          uv run pytest -q \
            --junitxml=test-results/worker-readiness-junit.xml \
            tests/unit/test_worker_readiness.py \
            tests/integration/test_worker_lifecycle.py \
            2>&1 | tee test-results/worker-readiness.log
      - name: Verify owned PID evidence
        working-directory: backend
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("test-results/owned-pid-evidence.jsonl")
          records = [json.loads(line) for line in path.read_text().splitlines() if line.strip()]
          assert records, "owned PID evidence is empty"
          by_event = {record["event"]: record for record in records}
          before = by_event["owned-process-before-stop"]
          after = by_event["owned-process-after-stop"]
          assert before["owned_alive"] is True
          assert before["unrelated_alive"] is True
          assert after["owned_alive"] is False
          assert after["unrelated_alive"] is True
          assert before["native_pid"] == after["native_pid"]
          assert before["start_fingerprint"] == after["start_fingerprint"]
          PY
      - name: Smoke frontend API proxy
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://ci:ci@127.0.0.1:1/worker_readiness
          REDIS_URL: redis://127.0.0.1:6379/15
          JWT_SECRET: "ci-only-dummy-secret-that-is-more-than-32-bytes-long!!"
        run: |
          mkdir -p test-results
          MASTER_KEY="$(python -c 'import base64, os; print(base64.b64encode(os.urandom(32)).decode())')"
          export MASTER_KEY
          api_pid=''
          vite_pid=''
          cleanup() {
            [ -z "$vite_pid" ] || kill -TERM -- "-$vite_pid" 2>/dev/null || true
            [ -z "$api_pid" ] || kill -TERM -- "-$api_pid" 2>/dev/null || true
            [ -z "$vite_pid" ] || wait "$vite_pid" 2>/dev/null || true
            [ -z "$api_pid" ] || wait "$api_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          setsid bash -c 'cd backend && exec uv run uvicorn app.main:app --lifespan off --host 127.0.0.1 --port 18000' \
            > test-results/frontend-proxy-api.log 2>&1 &
          api_pid=$!
          VITE_API_TARGET=http://127.0.0.1:18000 \
            setsid npm run dev -- --host 127.0.0.1 --port 15173 \
            > test-results/frontend-proxy-vite.log 2>&1 &
          vite_pid=$!
          ready=0
          for _attempt in $(seq 1 80); do
            kill -0 "$api_pid"
            kill -0 "$vite_pid"
            if curl --fail --silent --show-error \
              http://127.0.0.1:15173/api/v1/openapi.json \
              > test-results/frontend-proxy-openapi.json; then
              ready=1
              break
            fi
            sleep 0.25
          done
          [ "$ready" = '1' ]
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("test-results/frontend-proxy-openapi.json").read_text())
          assert payload["info"]["title"] == "InterCraft API"
          assert any(path.startswith("/api/v1/") for path in payload["paths"])
          PY
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "worker-readiness-${{ github.run_id }}-${{ github.run_attempt }}"
          path: |
            backend/test-results/worker-readiness-junit.xml
            backend/test-results/worker-readiness.log
            backend/test-results/owned-pid-evidence.jsonl
            test-results/frontend-proxy-openapi.json
            test-results/frontend-proxy-api.log
            test-results/frontend-proxy-vite.log
          if-no-files-found: error
          retention-days: 14

  frontend-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Create test-results
        run: mkdir -p test-results
      - name: Run full frontend tests
        run: >
          npx vitest run
          --reporter default
          --reporter junit
          --outputFile test-results/frontend-full-junit.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "frontend-full-junit-${{ github.run_id }}-${{ github.run_attempt }}"
          path: test-results/frontend-full-junit.xml
          if-no-files-found: error
          retention-days: 14

  backend-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: intercraft_test
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U ci -d intercraft_test"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7
        ports:
          - '6379:6379'
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - name: Sync deps
        working-directory: backend
        run: uv sync --locked --extra dev
      - name: Create test-results
        working-directory: backend
        run: mkdir -p test-results
      - name: Create migration database roles
        env:
          PGPASSWORD: ci
        run: >-
          psql --host 127.0.0.1 --username ci --dbname intercraft_test
          --set ON_ERROR_STOP=1
          --command 'CREATE ROLE appuser NOLOGIN; CREATE ROLE postgres SUPERUSER NOLOGIN'
      - name: Run database migrations
        working-directory: backend
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://ci:ci@127.0.0.1:5432/intercraft_test
          JWT_SECRET: "ci-only-dummy-secret-that-is-more-than-32-bytes-long!!"
        run: |
          set -o pipefail
          MASTER_KEY="$(python -c 'import base64, os; print(base64.b64encode(os.urandom(32)).decode())')"
          export MASTER_KEY
          uv run alembic upgrade head 2>&1 | tee test-results/backend-full-alembic.log
      - name: Run full backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://ci:ci@127.0.0.1:5432/intercraft_test
          REDIS_URL: redis://localhost:6379/0
          APP_ENV: test
          DB_USE_NULL_POOL: '1'
          JWT_SECRET: "ci-only-dummy-secret-that-is-more-than-32-bytes-long!!"
        run: |
          MASTER_KEY="$(python -c 'import base64, os; print(base64.b64encode(os.urandom(32)).decode())')"
          export MASTER_KEY
          timeout 20m uv run pytest tests/unit -q \
            --junitxml=test-results/backend-full-junit.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: "backend-full-junit-${{ github.run_id }}-${{ github.run_attempt }}"
          path: |
            backend/test-results/backend-full-junit.xml
            backend/test-results/backend-full-alembic.log
          if-no-files-found: error
          retention-days: 14
