name: Playwright

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: intercraft_test
          POSTGRES_USER: intercraft_test
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: true
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://intercraft_test:testpass@localhost:5432/intercraft_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-jwt-secret-not-for-production
      MASTER_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      BCRYPT_COST_ROUNDS: 4
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      VITE_API_TARGET: http://127.0.0.1:8000
      VITE_USE_MOCK: false
      E2E_BASE_URL: http://127.0.0.1:5173
      E2E_FRONTEND_BASE: http://127.0.0.1:5173
      E2E_BACKEND_BASE: http://127.0.0.1:8000
      E2E_API_BASE: http://127.0.0.1:8000
      E2E_REPO_ROOT: ${{ github.workspace }}
      LLM_MOCK_MODE: 1
      TAVILY_MOCK_MODE: 1

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        working-directory: backend
        run: uv sync --extra dev --locked

      - name: Create migration database roles
        env:
          PGPASSWORD: testpass
        run: >-
          psql --host localhost --username intercraft_test --dbname intercraft_test
          --set ON_ERROR_STOP=1
          --command 'CREATE ROLE appuser NOLOGIN; CREATE ROLE postgres NOLOGIN'

      - name: Run database migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke test
        if: github.event_name == 'pull_request'
        run: npm run e2e -- --project=chromium tests/e2e/auth-register-login.spec.ts

      - name: Run full suite
        if: github.event_name == 'workflow_dispatch'
        run: npm run e2e -- --project=chromium

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-results/
          retention-days: 14
          if-no-files-found: warn
