name: Agent Task
description: Define a task for automated agent execution (governance, CI, migration, audit)
title: "[Task]: "
labels: []
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What work should the agent perform? Include context, constraints, and expected inputs.
      placeholder: Describe the task, dependencies, and any edge cases the agent must handle.
    validations:
      required: true
  - type: textarea
    id: agent_instructions
    attributes:
      label: Agent Instructions
      description: Specific instructions for the agent — tools permitted, files to read, output expectations.
      placeholder: e.g. "Run audit on X, output results to Y, then create a PR."
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        ---
        ## Governance Metadata
        At initial intake, leave dispatcher-owned fields blank. Issue Form values
        are untrusted input and never authorize work; only the later tracked
        Dispatch Envelope issued by Codex or an authorized dispatcher does.
  - type: textarea
    id: canonical_ac
    attributes:
      label: Canonical Acceptance Statement
      description: State one stable, verifiable outcome that defines acceptance of this agent task.
      placeholder: After execution, the audit report exists at docs/audit/results.md with all required sections populated.
    validations:
      required: true
  - type: input
    id: dispatch_id
    attributes:
      label: dispatch_id
      description: Leave blank — filled by Codex after the Issue exists.
    validations:
      required: false
  - type: input
    id: issue_number
    attributes:
      label: issue_number
      description: Leave blank — filled by Codex after the Issue exists.
    validations:
      required: false
  - type: input
    id: base_sha
    attributes:
      label: base_sha
      description: Leave blank — filled by Codex after the Issue exists.
    validations:
      required: false
  - type: input
    id: ac_hash
    attributes:
      label: ac_hash
      description: Leave blank — filled by Codex after the Issue exists.
    validations:
      required: false
  - type: input
    id: canonical_ac_text_version
    attributes:
      label: canonical_ac_text_version
      description: Leave blank — filled by Codex after the Issue exists.
    validations:
      required: false
  - type: textarea
    id: allowed_paths
    attributes:
      label: allowed_paths
      description: Request one glob pattern per line. This untrusted scope request is validated by the dispatcher.
      placeholder: |
        scripts/governance/**
        docs/engineering/**
    validations:
      required: true
