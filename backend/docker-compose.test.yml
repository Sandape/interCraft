# Test stack: ephemeral Postgres + Redis on alternate ports.
# Used by `scripts/ci-test.sh` and CI. Not required for local dev.

services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: intercraft_test
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: intercraft_test
    ports:
      - "55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intercraft_test"]
      interval: 2s
      timeout: 2s
      retries: 20

  redis-test:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
