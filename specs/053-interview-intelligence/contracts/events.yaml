## Internal Events

### Task Cancellation (FR-011)

When user modifies interview_time or changes status away from interview round:

1. Query: `SELECT * FROM interview_research_tasks WHERE job_id = :jid AND status = 'pending'`
2. UPDATE: `SET status = 'cancelled' WHERE id = :task_id`
3. If task is `running`: do NOT interrupt; allow completion; report appends "面试时间已于 XX:XX 更新" note

### Post-Interview Reminder (Edge Case)

When interview_time passes and job status is still an interview state:

- Trigger: `scan_post_interview_reminder` cron (daily at 10:00 UTC) — **deferred to future iteration**; spec says "24 小时后" which is complex to schedule per-job. Instead, implement as a daily sweep: find jobs where `interview_time < NOW() - INTERVAL '24h'` AND `status IN ('test','interview_1','interview_2','interview_3')`.
- Action: Send WeChat message "你的 XX 公司面试（原定于 XX 时间）是否已完成？可以在 InterCraft 中更新状态哦"

### Quota Exhaustion Handling (Edge Case)

If Tavily API returns quota-exhausted error during search:
1. Reduce search to 2 dimensions (interview_experience + company_product)
2. Report marked with "本月调研配额已用尽，以下为精简版报告"
3. Alert admin via existing Prometheus alert or notification
