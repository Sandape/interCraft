## ARQ Task Function

### `execute_research_task`

**Triggered by**: `scan_interview_research` cron (or manual CLI)
**File**: `backend/app/workers/tasks/interview_research.py`

```python
async def execute_research_task(ctx: dict, task_id: str) -> dict:
    """
    Execute a single research task:
    1. Update task status to 'running'
    2. Extract business keywords via LLM (FR-012)
    3. Execute 4 search dimensions in parallel (FR-012/FR-013)
    4. Generate report via LLM (FR-015)
    5. Quality check report (FR-018); retry once if failed
    6. Save report to interview_reports (FR-016)
    7. Deliver via WeChat (FR-019) or notification fallback (FR-020)
    8. Update task status to 'completed' or 'failed'
    """
    ...
    return {
        "task_id": "uuid",
        "status": "completed",
        "report_id": "uuid",
        "delivery_status": "sent",
        "search_dimensions": {
            "interview_experience": {"results": 5, "status": "completed"},
            "company_product": {"results": 4, "status": "completed"},
            "exam_points": {"results": 5, "status": "completed"},
            "user_weakness": {"results": 2, "status": "completed"}
        },
        "duration_ms": 45000,
        "tokens_used": 8500
    }
```

**Execution flow**:

```
execute_research_task(task_id)
  │
  ├─ [1] Load task + job from DB
  │     └─ Fail if task not found or job deleted
  │
  ├─ [2] Update task status: pending → running, set started_at
  │
  ├─ [3] LLM: Extract 2-3 business keywords from position + notes_md
  │     └─ ~200 tokens
  │
  ├─ [4] Parallel search (asyncio.gather):
  │     ├─ interview_experience: tavily_search(["{company} {position} 面试经验 面经"])
  │     ├─ company_product: tavily_search(["{company} {keyword} 产品 最新"])
  │     ├─ exam_points: tavily_search(["{position} 面试知识点 考察点"])
  │     └─ user_weakness: local DB (ability_dimensions + error_questions)
  │     └─ Each: 3 retries, exponential backoff 2s/4s/8s
  │     └─ Save results to interview_research_results
  │
  ├─ [5] Check 24h cache for same-company results (skip if fresh cache hit)
  │
  ├─ [6] LLM: Generate structured report (6 chapters, 2000-3000 chars)
  │     └─ ~8K-15K tokens
  │
  ├─ [7] Quality check (FR-018):
  │     ├─ (a) Not empty or template-only
  │     ├─ (b) ≥1 specific company/product name
  │     ├─ (c) ≥3 specific interview questions
  │     ├─ (d) ≥1 ability dimension referenced (skip if new user)
  │     ├─ PASS → continue to [8]
  │     └─ FAIL (1st time) → retry from [4] (re-search + re-generate)
  │     └─ FAIL (2nd time) → mark quality_failed, notify admin, stop
  │
  ├─ [8] Save report to interview_reports (report_type='pre_interview_research')
  │
  ├─ [9] Deliver report:
  │     ├─ Check if user has active WeChat binding
  │     ├─ If yes: convert Markdown→plain text, split into ~500-char segments
  │     │         send via POST /agent/internal/send-message
  │     │         retry each segment 3x on failure
  │     └─ If no (or send failed): create Notification + save to DB
  │
  └─ [10] Update task: status→completed, set completed_at, link report_id
```

