# Event/Job Contracts: Interview Intelligence Engine

**Feature**: REQ-053 | **Date**: 2026-07-09

## ARQ Cron Job

### `scan_interview_research`

**Schedule**: Every 10 minutes (`minute={0, 10, 20, 30, 40, 50}`)
**File**: `backend/app/workers/tasks/interview_research.py`

```python
async def scan_interview_research(ctx: dict) -> dict:
    """
    Scan jobs table for interviews happening in ~5 hours.
    For each match: create InterviewResearchTask + enqueue execute_research_task.
    Returns summary of actions taken.
    """
    ...
    return {
        "scanned_at": "2026-07-10T09:00:00+08:00",
        "matched": 3,
        "tasks_created": 3,
        "skipped_duplicate": 1,
        "skipped_deleted_user": 0,
        "duration_ms": 120
    }
```

**Scan SQL** (FR-009):
```sql
SELECT j.id, j.user_id, j.company, j.position, j.interview_time, j.status
FROM jobs j
LEFT JOIN interview_research_tasks t
    ON t.job_id = j.id AND t.interview_time = j.interview_time AND t.status != 'cancelled'
WHERE j.status IN ('test', 'interview_1', 'interview_2', 'interview_3')
  AND j.interview_time BETWEEN NOW() + INTERVAL '4h 55m' AND NOW() + INTERVAL '5h 5m'
  AND j.deleted_at IS NULL
  AND t.id IS NULL
```

**Redis Lock**: Key `lock:scan_interview_research`, TTL 540s (9 min). Skip if lock held.

**For each matched row**:
1. INSERT into `interview_research_tasks` (status=pending)
2. Enqueue `execute_research_task` via `enqueue_job('execute_research_task', task_id=task.id)`

