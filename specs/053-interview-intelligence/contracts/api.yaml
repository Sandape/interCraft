## Error Responses

| Status | Scenario | Response |
|--------|----------|----------|
| 409 | Duplicate research task | `{"detail": "该面试时间已存在调研任务"}` |
| 422 | interview_time in past | `{"detail": "面试时间必须是将来时间"}` |
| 422 | interview_time without interview status | `{"detail": "请先将岗位状态推进到面试轮次"}` |
| 404 | Report not found | `{"detail": "报告不存在"}` |
| 404 | No reports for job | `{"detail": "该岗位暂无面试备战报告"}` |
| 422 | Invalid rating | `{"detail": "评分必须为 1-5 的整数"}` |
