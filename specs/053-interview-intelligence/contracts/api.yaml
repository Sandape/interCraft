## New Endpoints

### `GET /api/v1/jobs/{id}/research-reports`

List all research reports for a job (FR-022).

**Response** (200):
```json
{
  "data": [
    {
      "id": "uuid",
      "report_type": "pre_interview_research",
      "job_id": "uuid",
      "interview_time": "2026-07-10T14:00:00+08:00",
      "company": "阿里巴巴",
      "position": "Java 开发工程师",
      "status": "interview_1",
      "generated_at": "2026-07-10T09:05:00+08:00",
      "delivery_status": "sent",
      "rating": null
    }
  ]
}
```

**Sorted by**: `interview_time DESC`

### `GET /api/v1/jobs/{id}/research-reports/{report_id}`

Get full report content (FR-022).

**Response** (200):
```json
{
  "id": "uuid",
  "report_type": "pre_interview_research",
  "job_id": "uuid",
  "interview_time": "2026-07-10T14:00:00+08:00",
  "summary_md": "# 📋 面试概览\n\n...",
  "research_task_id": "uuid",
  "rating": null,
  "generated_at": "2026-07-10T09:05:00+08:00",
  "delivery_status": "sent",
  "delivered_at": "2026-07-10T09:05:30+08:00",
  "quality_check_passed": true
}
```

### `PATCH /api/v1/research-reports/{report_id}/rating`

Submit user rating for a report (SC-009).

**Request Body**:
```json
{
  "rating": 4
}
```

**Validation**: `rating` must be integer 1-5.

**Response** (200):
```json
{
  "id": "uuid",
  "rating": 4
}
```

### `GET /api/v1/research/stats`

Return research task statistics for the current user (for admin debugging).

**Response** (200):
```json
{
  "total_tasks": 15,
  "by_status": {
    "pending": 0,
    "running": 0,
    "completed": 12,
    "cancelled": 2,
    "failed": 1
  },
  "total_reports": 12,
  "average_rating": 4.2
}
```

